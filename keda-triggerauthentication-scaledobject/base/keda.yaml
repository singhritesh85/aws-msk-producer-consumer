---
apiVersion: v1
kind: Secret
metadata:
  name: keda-msk-auth-secrets
  namespace: producer-consumer
type: Opaque
stringData:
  sasl: aws_msk_iam
  tls: enable
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: keda-msk-trigger-auth
  namespace: producer-consumer
spec:
  podIdentity:
    provider: aws
  secretTargetRef:
    - parameter: sasl
      name: keda-msk-auth-secrets
      key: sasl
    - parameter: tls
      name: keda-msk-auth-secrets
      key: tls
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: kafka-consumer-scaler
  namespace: producer-consumer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kafka-consumer
  minReplicaCount: 1
  maxReplicaCount: 5
  triggers:
    - type: apache-kafka
      metadata:
        bootstrapServers: "PLACEHOLDER_BOOTSTRAP_SERVERS"
        consumerGroup: eks-group
        topic: kafka-demo-topic
        lagThreshold: "1"
        offsetResetPolicy: latest
        allowIdleConsumers: "true"
        awsRegion: aws-region
      authenticationRef:
        name: keda-msk-trigger-auth
